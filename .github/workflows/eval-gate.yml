name: Eval Gate

# CI cost policy:
#   PR / push → unit only (free) + eval-fast (API tests skipped unless secrets set)
#   workflow_dispatch → optional full eval (RAGAS, DeepEval, gate, promote)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      promote_baseline:
        description: Promote baseline after a green full eval
        type: boolean
        default: false

env:
  EMBEDDING_PROVIDER: local
  EVAL_PROVIDERS: anthropic
  EVAL_USE_CACHE: "1"

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: make unit

  eval-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"

      - uses: actions/cache@v4
        with:
          path: chroma_db
          key: chroma-${{ hashFiles('corpus/eu_ai_act.pdf') }}

      - name: Ingest corpus (local embeddings — no OpenAI)
        run: |
          if [ ! -d chroma_db ] || [ "$(find chroma_db -type f | wc -l)" -eq 0 ]; then
            if [ -f corpus/eu_ai_act.pdf ]; then
              python scripts/ingest_corpus.py
            else
              echo "SKIP: corpus/eu_ai_act.pdf not in repo"
            fi
          fi

      - name: Fast eval (adversarial + budget; skips if no API keys)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: make eval-fast

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report-fast
          path: eval/reports/

  eval-full:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"

      - uses: actions/cache@v4
        with:
          path: |
            chroma_db
            .eval_cache
          key: eval-${{ hashFiles('corpus/eu_ai_act.pdf', 'eval/datasets/golden.jsonl') }}

      - name: Ingest corpus
        run: |
          if [ -f corpus/eu_ai_act.pdf ]; then python scripts/ingest_corpus.py; fi

      - name: Full eval suite (RAGAS, DeepEval, agent, gate)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: make eval-full

      - name: Promote baseline
        if: inputs.promote_baseline
        run: make promote-baseline

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report-full
          path: eval/reports/

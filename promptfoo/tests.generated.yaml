- description: rag-013
  vars:
    question: What is a provider under the EU AI Act?
    expected_answer: A provider is a natural or legal person, public authority, agency
      or other body that develops an AI system or a general-purpose AI model and places
      it on the market or puts it into service under its own name or trademark.
  assert:
  - type: llm-rubric
    value: 'The answer should be factually aligned with this reference: A provider
      is a natural or legal person, public authority, agency or other body that develops
      an AI system or a general-purpose AI model and places it on the market or puts
      it into service under its own name or trademark.'
  - type: latency
    threshold: 8000
- description: rag-014
  vars:
    question: What are the rules for limited-risk AI systems like chatbots?
    expected_answer: Limited-risk AI systems are subject to transparency obligations,
      such as informing users they are interacting with an AI system and marking AI-generated
      content.
  assert:
  - type: llm-rubric
    value: 'The answer should be factually aligned with this reference: Limited-risk
      AI systems are subject to transparency obligations, such as informing users
      they are interacting with an AI system and marking AI-generated content.'
  - type: latency
    threshold: 8000
- description: rag-015
  vars:
    question: Who enforces the EU AI Act at national level?
    expected_answer: Member States designate national competent authorities responsible
      for supervising and enforcing the Regulation.
  assert:
  - type: llm-rubric
    value: 'The answer should be factually aligned with this reference: Member States
      designate national competent authorities responsible for supervising and enforcing
      the Regulation.'
  - type: latency
    threshold: 8000
- description: rag-016
  vars:
    question: What documentation must high-risk AI providers maintain?
    expected_answer: Providers must prepare technical documentation before placing
      a high-risk system on the market, including a description of the system, design
      specifications, risk management, and information on monitoring and human oversight.
  assert:
  - type: llm-rubric
    value: 'The answer should be factually aligned with this reference: Providers
      must prepare technical documentation before placing a high-risk system on the
      market, including a description of the system, design specifications, risk management,
      and information on monitoring and human oversight.'
  - type: latency
    threshold: 8000

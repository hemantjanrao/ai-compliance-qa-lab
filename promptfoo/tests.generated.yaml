- description: rag-001
  vars:
    question: What is the definition of an AI system under the EU AI Act?
    expected_answer: An AI system is a machine-based system designed to operate with
      varying levels of autonomy that may exhibit adaptiveness and that, for explicit
      or implicit objectives, infers from the input it receives how to generate outputs
      such as predictions, content, recommendations, or decisions that can influence
      physical or virtual environments.
  assert:
  - type: llm-rubric
    value: 'The answer should be factually aligned with this reference: An AI system
      is a machine-based system designed to operate with varying levels of autonomy
      that may exhibit adaptiveness and that, for explicit or implicit objectives,
      infers from the input it receives how to generate outputs such as predictions,
      content, recommendations, or decisions that can influence physical or virtual
      environments.'
  - type: latency
    threshold: 8000
- description: rag-002
  vars:
    question: Which AI practices are prohibited under Article 5?
    expected_answer: Prohibited practices include subliminal manipulation causing
      harm, exploitation of vulnerabilities, social scoring by public authorities,
      real-time remote biometric identification in public spaces by law enforcement
      (with limited exceptions), emotion recognition in workplaces and schools, biometric
      categorisation inferring sensitive attributes, and untargeted scraping of facial
      images.
  assert:
  - type: llm-rubric
    value: 'The answer should be factually aligned with this reference: Prohibited
      practices include subliminal manipulation causing harm, exploitation of vulnerabilities,
      social scoring by public authorities, real-time remote biometric identification
      in public spaces by law enforcement (with limited exceptions), emotion recognition
      in workplaces and schools, biometric categorisation inferring sensitive attributes,
      and untargeted scraping of facial images.'
  - type: latency
    threshold: 8000
- description: rag-003
  vars:
    question: What are the requirements for high-risk AI systems?
    expected_answer: High-risk systems must establish a risk management system, ensure
      data governance, prepare technical documentation, maintain record-keeping/logs,
      provide transparency to deployers, enable human oversight, and meet accuracy,
      robustness, and cybersecurity requirements.
  assert:
  - type: llm-rubric
    value: 'The answer should be factually aligned with this reference: High-risk
      systems must establish a risk management system, ensure data governance, prepare
      technical documentation, maintain record-keeping/logs, provide transparency
      to deployers, enable human oversight, and meet accuracy, robustness, and cybersecurity
      requirements.'
  - type: latency
    threshold: 8000
- description: rag-004
  vars:
    question: When does the EU AI Act enter into force?
    expected_answer: The Regulation entered into force on 1 August 2024 and applies
      from 2 August 2026, with prohibitions applying from 2 February 2025 and rules
      for general-purpose AI models applying from 2 August 2025.
  assert:
  - type: llm-rubric
    value: 'The answer should be factually aligned with this reference: The Regulation
      entered into force on 1 August 2024 and applies from 2 August 2026, with prohibitions
      applying from 2 February 2025 and rules for general-purpose AI models applying
      from 2 August 2025.'
  - type: latency
    threshold: 8000
- description: rag-005
  vars:
    question: What are the penalties for non-compliance with prohibited AI practices?
    expected_answer: Non-compliance with prohibited AI practices under Article 5 can
      result in fines up to 35 million EUR or 7% of total worldwide annual turnover,
      whichever is higher.
  assert:
  - type: llm-rubric
    value: 'The answer should be factually aligned with this reference: Non-compliance
      with prohibited AI practices under Article 5 can result in fines up to 35 million
      EUR or 7% of total worldwide annual turnover, whichever is higher.'
  - type: latency
    threshold: 8000
- description: rag-006
  vars:
    question: What is a general-purpose AI model?
    expected_answer: A general-purpose AI model is an AI model that displays significant
      generality, is capable of competently performing a wide range of distinct tasks,
      and can be integrated into a variety of downstream systems or applications.
  assert:
  - type: llm-rubric
    value: 'The answer should be factually aligned with this reference: A general-purpose
      AI model is an AI model that displays significant generality, is capable of
      competently performing a wide range of distinct tasks, and can be integrated
      into a variety of downstream systems or applications.'
  - type: latency
    threshold: 8000
- description: rag-007
  vars:
    question: What obligations apply to providers of general-purpose AI models with
      systemic risk?
    expected_answer: Providers must perform model evaluations including adversarial
      testing, assess and mitigate systemic risks, track and report serious incidents,
      and ensure adequate cybersecurity protection for the model and its physical
      infrastructure.
  assert:
  - type: llm-rubric
    value: 'The answer should be factually aligned with this reference: Providers
      must perform model evaluations including adversarial testing, assess and mitigate
      systemic risks, track and report serious incidents, and ensure adequate cybersecurity
      protection for the model and its physical infrastructure.'
  - type: latency
    threshold: 8000
- description: rag-008
  vars:
    question: What transparency obligations apply to AI systems that interact with
      natural persons?
    expected_answer: Providers must ensure that AI systems intended to interact directly
      with natural persons are designed so that those persons are informed they are
      interacting with an AI system, unless this is obvious from the context.
  assert:
  - type: llm-rubric
    value: 'The answer should be factually aligned with this reference: Providers
      must ensure that AI systems intended to interact directly with natural persons
      are designed so that those persons are informed they are interacting with an
      AI system, unless this is obvious from the context.'
  - type: latency
    threshold: 8000
- description: rag-009
  vars:
    question: What is the role of the AI Office?
    expected_answer: The AI Office, established within the European Commission, supports
      implementation and enforcement of the Regulation, particularly for general-purpose
      AI models, and coordinates with national authorities.
  assert:
  - type: llm-rubric
    value: 'The answer should be factually aligned with this reference: The AI Office,
      established within the European Commission, supports implementation and enforcement
      of the Regulation, particularly for general-purpose AI models, and coordinates
      with national authorities.'
  - type: latency
    threshold: 8000
- description: rag-010
  vars:
    question: Are open-source AI models exempt from the Regulation?
    expected_answer: AI systems released under free and open-source licences are generally
      exempt, except when placed on the market as high-risk AI systems, used as prohibited
      practices, or when they are general-purpose AI models with systemic risk.
  assert:
  - type: llm-rubric
    value: 'The answer should be factually aligned with this reference: AI systems
      released under free and open-source licences are generally exempt, except when
      placed on the market as high-risk AI systems, used as prohibited practices,
      or when they are general-purpose AI models with systemic risk.'
  - type: latency
    threshold: 8000
- description: rag-011
  vars:
    question: What is a deployer under the EU AI Act?
    expected_answer: A deployer is a natural or legal person, public authority, agency,
      or other body using an AI system under its authority, except where the AI system
      is used in the course of a personal non-professional activity.
  assert:
  - type: llm-rubric
    value: 'The answer should be factually aligned with this reference: A deployer
      is a natural or legal person, public authority, agency, or other body using
      an AI system under its authority, except where the AI system is used in the
      course of a personal non-professional activity.'
  - type: latency
    threshold: 8000
- description: rag-012
  vars:
    question: What does the Act say about prompt engineering techniques for jailbreaking?
    expected_answer: I cannot find that in the provided documents.
  assert:
  - type: contains-any
    value:
    - cannot find
    - not in
    - no information
  - type: llm-rubric
    value: The model should refuse or say it cannot find the answer in the provided

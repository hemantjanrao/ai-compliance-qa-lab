- description: rag-023
  vars:
    question: What is a fundamental rights impact assessment under the Act?
    expected_answer: Deployers of high-risk AI systems that are public bodies or private
      entities providing public services must, before putting the system into use,
      perform a fundamental rights impact assessment to identify and mitigate risks
      to fundamental rights.
  assert:
  - type: llm-rubric
    value: 'The answer should be factually aligned with this reference: Deployers
      of high-risk AI systems that are public bodies or private entities providing
      public services must, before putting the system into use, perform a fundamental
      rights impact assessment to identify and mitigate risks to fundamental rights.'

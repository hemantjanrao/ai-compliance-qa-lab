- description: rag-018
  vars:
    question: What is real-time remote biometric identification?
    expected_answer: Real-time remote biometric identification is the use of biometric
      data to identify individuals without their active involvement, in real time,
      typically in publicly accessible spaces.
  assert:
  - type: llm-rubric
    value: 'The answer should be factually aligned with this reference: Real-time
      remote biometric identification is the use of biometric data to identify individuals
      without their active involvement, in real time, typically in publicly accessible
      spaces.'
  - type: latency
    threshold: 8000
- description: rag-019
  vars:
    question: What are the fines for incorrect information provided to authorities?
    expected_answer: Providing incorrect, incomplete or misleading information to
      notified bodies or national authorities can result in fines up to 7.5 million
      EUR or 1% of total worldwide annual turnover, whichever is higher.
  assert:
  - type: llm-rubric
    value: 'The answer should be factually aligned with this reference: Providing
      incorrect, incomplete or misleading information to notified bodies or national
      authorities can result in fines up to 7.5 million EUR or 1% of total worldwide
      annual turnover, whichever is higher.'
  - type: latency
    threshold: 8000
- description: rag-020
  vars:
    question: Does the AI Act cover AI used in video games?
    expected_answer: AI systems used in video games are generally considered minimal
      risk unless they fall into a higher-risk category.
  assert:
  - type: llm-rubric
    value: 'The answer should be factually aligned with this reference: AI systems
      used in video games are generally considered minimal risk unless they fall into
      a higher-risk category.'
  - type: latency
    threshold: 8000
- description: rag-021
  vars:
    question: What human oversight is required for high-risk AI systems?
    expected_answer: High-risk AI systems must enable effective human oversight by
      natural persons with the necessary competence, authority, and resources, including
      the ability to understand system capacities and limitations, monitor operation,
      and intervene or interrupt the system when appropriate.
  assert:
  - type: llm-rubric
    value: 'The answer should be factually aligned with this reference: High-risk
      AI systems must enable effective human oversight by natural persons with the
      necessary competence, authority, and resources, including the ability to understand
